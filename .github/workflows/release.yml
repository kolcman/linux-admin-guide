name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        run: go build -o linux-guide .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-guide
          path: linux-guide
